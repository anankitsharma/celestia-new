name: Build release AAB

# Manual-only — a signed Android App Bundle is for Play Store submission, not
# every push. Produces a Play-ready .aab signed with your production keystore
# (stored as base64 in repo secrets). Runs entirely on GitHub's cloud runners.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64    — base64 of your upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD  — keystore password
#   ANDROID_KEY_ALIAS          — key alias
#   ANDROID_KEY_PASSWORD       — key password
#
# No other secrets: Celestia hardcodes its config (Gemini via Supabase proxy;
# RevenueCat + Supabase anon keys are public). Nothing else is injected.

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'User-facing version (e.g. 1.0.8). Leave blank to keep app.json value.'
        required: false
        default: ''
      version_code:
        description: 'Android build number (integer). Leave blank to use app.json android.versionCode. MUST exceed the last value on Play.'
        required: false
        default: ''
      release_notes:
        description: 'Optional note for the GitHub Release'
        required: false
        default: 'Production AAB'

permissions:
  contents: write

concurrency:
  group: build-aab
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"

jobs:
  build:
    name: Build signed AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/platforms/android-35
            /usr/local/lib/android/sdk/build-tools/35.0.0
            /usr/local/lib/android/sdk/platform-tools
            ~/.android
          key: android-sdk-35-buildtools-35.0.0
          restore-keys: |
            android-sdk-35-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: '35.0.0'

      - name: Cache Gradle home
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      # versionCode = minutes since the Unix epoch: always increasing, never
      # collides, far under Play's 2.1B cap. Fixes "version code already used".
      - name: Set Android versionCode + versionName
        id: version
        env:
          INPUT_VERSION_NAME: ${{ github.event.inputs.version_name }}
          INPUT_VERSION_CODE: ${{ github.event.inputs.version_code }}
        run: |
          python3 - <<'PY'
          import json, os
          p = "app.json"
          d = json.load(open(p))
          expo = d["expo"]
          android = expo.setdefault("android", {})
          # Sequential build number: workflow input overrides app.json. This must
          # exceed the last versionCode uploaded to Play, or Play rejects the AAB.
          vc_in = os.environ.get("INPUT_VERSION_CODE", "").strip()
          if vc_in:
              android["versionCode"] = int(vc_in)
          code = int(android.get("versionCode") or 1)
          android["versionCode"] = code
          vn = os.environ.get("INPUT_VERSION_NAME", "").strip()
          if vn:
              expo["version"] = vn
          json.dump(d, open(p, "w"), indent=2)
          print(f"versionCode={code}  versionName={expo['version']}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"code={code}\n")
              f.write(f"name={expo['version']}\n")
          PY

      - name: Generate native android/ folder via Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Decode upload keystore
        working-directory: android/app
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > upload.keystore
          echo "Keystore decoded ($(wc -c < upload.keystore) bytes)."

      - name: Patch gradle.properties for heap, Jetifier, signing
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          {
            echo ""
            echo "# Appended by CI (build-aab.yml)"
            echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
            echo "android.enableJetifier=false"
            echo "android.useAndroidX=true"
            echo "CELESTIA_UPLOAD_STORE_FILE=upload.keystore"
            echo "CELESTIA_UPLOAD_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}"
            echo "CELESTIA_UPLOAD_KEY_ALIAS=${ANDROID_KEY_ALIAS}"
            echo "CELESTIA_UPLOAD_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}"
          } >> gradle.properties
          # AAB builds all ABIs — Play Store splits per device.

      - name: Inject release signing config into android/app/build.gradle
        working-directory: android/app
        run: |
          python3 - <<'PY'
          import re, sys
          p = "build.gradle"
          s = open(p).read()

          # STEP 1 — point the release buildType at signingConfigs.release.
          s, n1 = re.subn(
              r'(release \{.*?signingConfig signingConfigs\.)debug',
              r'\1release',
              s, count=1, flags=re.DOTALL)

          # STEP 2 — add the release signingConfig (reads creds from gradle.properties).
          release_cfg = (
              "        release {\n"
              "            if (project.hasProperty('CELESTIA_UPLOAD_STORE_FILE')) {\n"
              "                storeFile file(CELESTIA_UPLOAD_STORE_FILE)\n"
              "                storePassword CELESTIA_UPLOAD_STORE_PASSWORD\n"
              "                keyAlias CELESTIA_UPLOAD_KEY_ALIAS\n"
              "                keyPassword CELESTIA_UPLOAD_KEY_PASSWORD\n"
              "            }\n"
              "        }\n"
          )
          s, n2 = re.subn(r'signingConfigs \{\n',
                          "signingConfigs {\n" + release_cfg, s, count=1)

          open(p, "w").write(s)

          rel = s.count("signingConfig signingConfigs.release")
          dbg = s.count("signingConfig signingConfigs.debug")
          print(f"buildType swap matched: {n1} (need 1)")
          print(f"signingConfigs inject matched: {n2} (need 1)")
          print(f"signingConfigs.release uses: {rel} (need 1)")
          if not (n1 == 1 and n2 == 1 and rel == 1):
              print("::error::build.gradle signing injection failed — refusing to "
                    "build a possibly debug-signed AAB.")
              sys.exit(1)
          print("OK release buildType now uses the upload keystore.")
          PY

      - name: Build signed release AAB
        working-directory: android
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4g"
        run: |
          ./gradlew bundleRelease \
            --no-daemon \
            --build-cache \
            --stacktrace

      - name: Locate built AAB
        id: find_aab
        run: |
          AAB=$(find android -name "*.aab" -path "*/outputs/bundle/*" | head -1)
          if [ -z "$AAB" ]; then echo "::error::No AAB found after build."; exit 1; fi
          SIZE=$(du -h "$AAB" | cut -f1)
          echo "aab=$AAB" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Found AAB: $AAB ($SIZE)"

      # Guard against accidentally shipping a debug-signed AAB (Play would reject
      # it). The standard Android debug keystore SHA1 is well-known and constant;
      # if the AAB matches it, the signing injection failed — fail the build.
      - name: Verify the AAB is NOT debug-signed
        run: |
          AAB="${{ steps.find_aab.outputs.aab }}"
          DEBUG_SHA1="61ED377E85D386A8DFEE6B864BD85B0BFAA5AF81"
          ACTUAL=$(keytool -printcert -jarfile "$AAB" 2>/dev/null \
            | grep -i "SHA1:" | head -1 \
            | sed 's/.*SHA1:\s*//; s/://g' | tr -d '[:space:]' | tr 'a-f' 'A-F')
          echo "AAB signer SHA1: $ACTUAL"
          echo "(record this fingerprint for Play Console app signing)"
          if [ "$ACTUAL" = "$DEBUG_SHA1" ]; then
            echo "::error::AAB is DEBUG-signed — Play will reject it. The keystore secret or signing injection is wrong."
            exit 1
          fi
          echo "✓ Signed with a non-debug (your upload) key."

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: celestia-release-${{ github.sha }}.aab
          path: ${{ steps.find_aab.outputs.aab }}
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release with AAB
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Release AAB #${{ github.run_number }}
          body: |
            **Celestia — Production AAB (Play Store ready)**

            ${{ github.event.inputs.release_notes }}

            versionName: `${{ steps.version.outputs.name }}`
            versionCode: `${{ steps.version.outputs.code }}`
            Commit: `${{ github.sha }}`
            Size: ${{ steps.find_aab.outputs.size }}
            Signed with the production upload keystore.

            Download the `.aab` and upload to Play Console.
          files: ${{ steps.find_aab.outputs.aab }}
          draft: false
          prerelease: false

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Release AAB build #${{ github.run_number }}"
            echo ""
            echo "**versionName**: ${{ steps.version.outputs.name }}"
            echo "**versionCode**: ${{ steps.version.outputs.code }}"
            echo "**Commit**: \`${{ github.sha }}\`"
            if [ -n "${{ steps.find_aab.outputs.size }}" ]; then
              echo "**AAB size**: ${{ steps.find_aab.outputs.size }}"
            fi
          } >> $GITHUB_STEP_SUMMARY
