<body class="h-full bg-background text-on-background antialiased flex flex-col items-center justify-center overflow-hidden">
<!-- Content Canvas - Centered Layout -->
<main class="flex-1 w-full max-w-xl mx-auto flex flex-col items-center justify-center px-margin-mobile relative z-10">
<!-- Kicker -->
<div class="mb-lg text-center">
<span class="font-utility-label text-utility-label text-on-surface-variant uppercase tracking-[0.2em] relative inline-block">
                YOUR CORE
                <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 border-b-[0.5px] border-primary/40"></span>
</span>
</div>
<!-- Big 3 Reveal Cluster -->
<div class="flex flex-col items-center gap-md relative w-full mb-xl">
<!-- Connection Line (Decorative behind) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 h-[80%] w-[0.5px] bg-primary/10 -z-10"></div>
<!-- Sun (Locked State Example) -->
<button class="relative w-full max-w-[280px] h-24 border-[0.5px] border-primary/20 bg-surface-container-lowest flex items-center justify-center group hover:border-primary/40 transition-colors duration-500">
<div class="absolute inset-0 bg-surface-dim opacity-0 group-hover:opacity-10 transition-opacity duration-500"></div>
<div class="flex flex-col items-center gap-2 relative z-10">
<span class="material-symbols-outlined text-secondary font-light" style="font-variation-settings: 'FILL' 0, 'wght' 200;">lock</span>
<span class="font-ceremonial-label text-ceremonial-label text-primary tracking-[0.15em]">REVEAL SUN</span>
</div>
</button>
<!-- Moon (Unlocked/Revealed State Example) -->
<div class="relative w-full max-w-[320px] p-md border-[0.5px] border-primary bg-surface-container-lowest flex items-center justify-between shadow-[0_0_20px_rgba(254,214,91,0.05)]">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center rounded-full border-[0.5px] border-primary/20 bg-surface">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 0, 'wght' 200;">dark_mode</span>
</div>
<div class="flex flex-col">
<span class="font-utility-label text-utility-label text-on-surface-variant mb-1 uppercase">Moon Sign</span>
<span class="font-headline-sm text-headline-sm text-primary">Taurus</span>
</div>
</div>
<div class="h-full border-l-[0.5px] border-primary/20 pl-4 flex items-center">
<span class="font-body-md text-body-md text-on-surface-variant italic">2° 14'</span>
</div>
</div>
<!-- Rising (Locked State Example) -->
<button class="relative w-full max-w-[280px] h-24 border-[0.5px] border-primary/20 bg-surface-container-lowest flex items-center justify-center group hover:border-primary/40 transition-colors duration-500">
<div class="absolute inset-0 bg-surface-dim opacity-0 group-hover:opacity-10 transition-opacity duration-500"></div>
<div class="flex flex-col items-center gap-2 relative z-10">
<span class="material-symbols-outlined text-secondary font-light" style="font-variation-settings: 'FILL' 0, 'wght' 200;">lock</span>
<span class="font-ceremonial-label text-ceremonial-label text-primary tracking-[0.15em]">REVEAL RISING</span>
</div>
</button>
</div>
<!-- Final Action (Would appear after all 3 revealed, shown here for structure) -->
<div class="opacity-50">
<button class="font-ceremonial-label text-ceremonial-label text-primary px-8 py-4 border-[0.5px] border-primary relative group overflow-hidden">
<span class="relative z-10">READ SYNTHESIS</span>
<span class="absolute bottom-2 left-1/2 -translate-x-1/2 w-8 border-b-[1px] border-secondary opacity-0 group-hover:opacity-100 transition-all duration-300"></span>
</button>
</div>
