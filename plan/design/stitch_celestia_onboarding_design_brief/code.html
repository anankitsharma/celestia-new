<div class="flex flex-col items-center w-full max-w-sm mt-lg flex-grow">

<div class="mb-lg text-secondary">
<span class="material-symbols-outlined symbol-filled text-3xl">auto_awesome</span>
</div>
<!-- Hero Statement -->
<h1 class="font-headline-h1 text-headline-h1 text-primary text-center mb-xl" id="modal-title">
                Tomorrow at 6:55am
            </h1>
<!-- Notification Preview Bubble -->
<div class="w-full bg-surface-container-highest rounded-2xl p-md shadow-sm border border-outline/10 mb-xl relative overflow-hidden backdrop-blur-sm">
<!-- Inner soft gradient -->
<div class="absolute inset-0 bg-gradient-to-br from-surface/50 to-transparent pointer-events-none"></div>
<div class="relative z-10 flex items-start gap-sm">
<!-- App Icon Stand-in -->
<div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center flex-shrink-0 shadow-sm">
<span class="font-headline-h2 text-headline-h2 text-on-primary">C</span>
</div>
<div class="flex-grow">
<div class="flex justify-between items-center mb-xs">
<span class="font-label-ui text-label-ui text-on-surface-variant font-bold tracking-wide">Celestia</span>

</div>
<p class="font-body-main text-[14px] leading-snug text-on-surface line-clamp-3">
                            Your real chart, not your sun sign. Your Moon in Cancer asks you to find comfort in familiar rhythms today.
                        </p>
</div>
</div>
</div>
<!-- Body Text -->
<p class="font-body-italic text-body-italic text-on-surface-variant text-center mb-xl max-w-[280px]">
                Your real chart, not your sun sign. Allow notifications and we'll start with this — first thing tomorrow.
            </p>
<div class="flex-grow"></div>

<div class="w-full flex flex-col gap-md mt-auto">

<button class="w-full bg-primary-container text-on-primary font-label-ui text-label-ui py-md px-lg rounded-full flex items-center justify-center transition-transform duration-200 active:scale-95 shadow-sm hover:opacity-90">
                    Allow Notifications
                </button>
<!-- Secondary Link -->
<button class="w-full text-on-surface-variant font-label-ui text-label-ui py-sm px-lg transition-colors duration-200 hover:text-primary active:scale-95">
                    Maybe later
                </button>
